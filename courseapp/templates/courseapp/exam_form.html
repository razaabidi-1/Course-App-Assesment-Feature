<!-- exam_form.html: Form for submitting exam answers -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam Submission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card">
        <div class="card-header bg-info text-white">
            <h2>Exam for {{ lesson.title }}</h2>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for question in questions %}
                    <div class="mb-3">
                        <label><strong>{{ question.text }}</strong></label>
                        <div>
                        {% for choice in question.choice_set.all %}
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="choices" value="{{ choice.id }}" id="choice{{ choice.id }}">
                                <label class="form-check-label" for="choice{{ choice.id }}">{{ choice.text }}</label>
                            </div>
                        {% endfor %}
                        </div>
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
